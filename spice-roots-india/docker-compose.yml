version: "3.9"
services:
  api:
    build:
      context: ./apps/server
      dockerfile: Dockerfile.dev
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=development
      - PORT=4000
      - MONGODB_URI=mongodb://mongo:27017/spiceroots
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=supersecretjwtkey-for-development-do-not-use-in-prod
    env_file:
      - ./apps/server/.env
    volumes:
      - ./apps/server:/app
      - /app/node_modules
    depends_on:
      - mongo
      - redis
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  mongo_data:
  redis_data:
